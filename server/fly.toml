app = "depinzcash-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BIND_ADDR = "0.0.0.0:8080"
  DATABASE_URL = "sqlite:///data/depinzcash.sqlite?mode=rwc"
  RUST_LOG = "info,sqlx=warn,hyper=warn,tower_http=info"
  ZCASH_NETWORK = "mainnet"
  SOLANA_CLUSTER = "mainnet-beta"
  CORS_ALLOWED_ORIGINS = "https://zcashdepin.com,https://www.zcashdepin.com,https://zcashdepin.vercel.app"
  RATE_LIMIT_ENABLED = "true"
  RATE_LIMIT_RPS = "2"
  RATE_LIMIT_BURST = "10"
  SCHEDULER_ENABLED = "true"
  MAX_NODES_PER_WALLET = "5"
  MIN_REAL_HEIGHT = "3000000"
  HEARTBEAT_INTERVAL = "60s"
  CHALLENGE_CHECK_INTERVAL = "60s"
  UPTIME_REWARD_INTERVAL = "300s"
  SNAPSHOT_INTERVAL = "7d"
  EXPOSED_RPC_POLL_INTERVAL = "5m"

# Secrets (set via `fly secrets set`):
#   ADMIN_API_KEY=<openssl rand -hex 32>
#   TRUSTED_RPCS=<comma-separated zcash json-rpc endpoints>
#   SPL_MINT=<solana mint address>
#   REGISTRATION_ENABLED=false          # kill-switch: block new registrations
#   PROOF_SUBMISSION_ENABLED=false      # kill-switch: block proof submissions
#   SCHEDULER_ENABLED=false             # kill-switch: disable all background jobs

[[mounts]]
  source = "depinzcash_data"
  destination = "/data"
  initial_size = "10gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"     # scheduler tickers need the machine awake
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 30

  # Health check intentionally disabled during the bot-traffic incident — Fly
  # was refusing to route ANY traffic (including healthz pings) because the
  # check kept failing, creating a deadlock. Re-enable once traffic stabilises.

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
  cpus = 2
