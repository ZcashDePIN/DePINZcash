name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: server (rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: cargo check
        run: cargo check --all-targets
      - name: cargo test
        run: cargo test --all-targets --no-fail-fast

  prover:
    name: prover + relay (rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prover
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - name: apt deps for rocksdb
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: prover
      - name: build relay binary
        run: cargo build --release --bin depinzcash-relay
      - name: cargo check prover
        run: cargo check --bin depinzcash-prover

  web:
    name: web (vite + react)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
